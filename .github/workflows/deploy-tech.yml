name: Deploy to ECS (.tech)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: tech-deploy
  cancel-in-progress: true

jobs:
  deploy-tech:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build env
        run: |
          test -n "$OSS_PUBLIC_URL" || (echo "Missing OSS_PUBLIC_URL" && exit 1)
        env:
          OSS_PUBLIC_URL: ${{ secrets.OSS_PUBLIC_URL }}

      - name: Build site
        run: npm run build
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_PUBLIC_URL: ${{ secrets.OSS_PUBLIC_URL }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TECH_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$TECH_DEPLOY_PORT" "$TECH_DEPLOY_HOST" >> ~/.ssh/known_hosts
        env:
          TECH_DEPLOY_SSH_KEY: ${{ secrets.TECH_DEPLOY_SSH_KEY }}
          TECH_DEPLOY_HOST: ${{ secrets.TECH_DEPLOY_HOST }}
          TECH_DEPLOY_PORT: ${{ secrets.TECH_DEPLOY_PORT }}

      - name: Sync release to ECS
        run: |
          RELEASE_DIR="$TECH_DEPLOY_PATH/releases/$GITHUB_SHA"
          ssh -p "$TECH_DEPLOY_PORT" "$TECH_DEPLOY_USER@$TECH_DEPLOY_HOST" "mkdir -p '$RELEASE_DIR' '$TECH_DEPLOY_PATH/releases'"
          rsync -az --delete -e "ssh -p $TECH_DEPLOY_PORT" dist/ "$TECH_DEPLOY_USER@$TECH_DEPLOY_HOST:$RELEASE_DIR/"
          ssh -p "$TECH_DEPLOY_PORT" "$TECH_DEPLOY_USER@$TECH_DEPLOY_HOST" '
            set -e
            RELEASE_DIR="'"$RELEASE_DIR"'"
            CURRENT_PATH="'"$TECH_DEPLOY_PATH"'/current"
            if [ -e "$CURRENT_PATH" ] && [ ! -L "$CURRENT_PATH" ]; then
              rm -rf "$CURRENT_PATH"
            fi
            ln -sfn "$RELEASE_DIR" "$CURRENT_PATH"
            find "$RELEASE_DIR" -type d -exec chmod 755 {} \;
            find "$RELEASE_DIR" -type f -exec chmod 644 {} \;
            chown -R www-data:www-data "$RELEASE_DIR"
          '
        env:
          TECH_DEPLOY_HOST: ${{ secrets.TECH_DEPLOY_HOST }}
          TECH_DEPLOY_PORT: ${{ secrets.TECH_DEPLOY_PORT }}
          TECH_DEPLOY_USER: ${{ secrets.TECH_DEPLOY_USER }}
          TECH_DEPLOY_PATH: ${{ secrets.TECH_DEPLOY_PATH }}

      - name: Verify deployed site
        run: |
          curl -I https://aisheishei.tech/
          curl -I https://aisheishei.tech/editor/
