name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build env
        run: |
          test -n "$PUBLIC_VIEW_API_BASE" || (echo "Missing PUBLIC_VIEW_API_BASE" && exit 1)
          test -n "$OSS_PUBLIC_URL" || (echo "Missing OSS_PUBLIC_URL" && exit 1)
        env:
          PUBLIC_VIEW_API_BASE: ${{ secrets.PUBLIC_VIEW_API_BASE }}
          OSS_PUBLIC_URL: ${{ secrets.OSS_PUBLIC_URL }}

      - name: Build site
        run: npm run build
        env:
          PUBLIC_VIEW_API_BASE: ${{ secrets.PUBLIC_VIEW_API_BASE }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_PUBLIC_URL: ${{ secrets.OSS_PUBLIC_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
